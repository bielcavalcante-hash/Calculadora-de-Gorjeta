<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculado de Gorjeta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="./calculadora-de-gorjeta_base/images/logo.svg" alt="logo de splitter">
    </header>

    <main>
        <section class="informacoes">
            <form action="">
                <div class="conta">
                    <label for="conta">Conta</label>
                    <div>
                        <img src="./calculadora-de-gorjeta_base/images/icon-dollar.svg" alt="Ícone do cifrão">
                        <input type="number" name="conta" id="conta">
                    </div>
                </div>

                <div class="gorjeta">
                    <label for="outra">Selecione a gorjeta %</label>

                    <div>
                        <input type="button"  value="5%">
                        <input type="button" value="10%">
                        <input type="button" value="15%">
                        <input type="button" value="25%">
                        <input type="button" value="50%">
                        <input type="number" name="outra" id="outra" >
                    </div>
                </div>

                <div class="pessoas">
                      <label for="pessoas">Quantidade de pessoas</label>
                      <p>Não pode ser zero</p>
                    <div>
                        <img src="./calculadora-de-gorjeta_base/images/icon-person.svg" alt="Ícone da pessoa">
                        <input type="number" name="pessoas" id="pessoas" placeholder="0">
                    </div>
                </div>
            </form>
        </section>

        <section class="resultados">
            <div class="gorjeta-total">
                <p>
                    <strong>Gorjeta</strong> <br>
                    /pessoa
                </p>

                <strong>$ 0.00</strong>
            </div>

                    <div class="total">
                <p>
                    <strong>Total</strong> <br>
                    /pessoa
                </p>

                <strong>$ 0.00</strong>
            </div>
        </section>
    </main>
</body>
</html>
